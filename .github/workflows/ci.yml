name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LANG: cs_CZ.UTF-8
      LC_ALL: cs_CZ.UTF-8

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ghostscript \
            locales \
            texlive-extra-utils \
            texlive-lang-czechslovak \
            texlive-latex-extra \
            texlive-luatex
          sudo sed -i 's/^# *cs_CZ.UTF-8 UTF-8/cs_CZ.UTF-8 UTF-8/' /etc/locale.gen
          sudo locale-gen cs_CZ.UTF-8
          sudo update-locale LANG=cs_CZ.UTF-8 LC_ALL=cs_CZ.UTF-8

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build chordbooks
        run: make -j

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LANG: cs_CZ.UTF-8
      LC_ALL: cs_CZ.UTF-8

    steps:
      - uses: actions/checkout@v5

      - name: Install locale
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo sed -i 's/^# *cs_CZ.UTF-8 UTF-8/cs_CZ.UTF-8 UTF-8/' /etc/locale.gen
          sudo locale-gen cs_CZ.UTF-8
          sudo update-locale LANG=cs_CZ.UTF-8 LC_ALL=cs_CZ.UTF-8

      - name: Build Pages output
        run: |
          make -C output -j
          rm -f .gitignore output/.gitignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
